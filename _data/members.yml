  bio: "Ryo Takahashi is a project assistant professor (特任助教) in the Graduate School of Engineering at the University of Tokyo. His research interests lie broadly in wearable computing, human-computer interaction, electric textiles, and battery-free, wireless devices.<br><br>In 2023, he completed his PhD in the Graduate School of Engineering, advised by Prof. Yoshihiro Kawahara at the University of Tokyo. In 2022, he worked as a research scientist intern at Meta Reality Labs, advised by Prof. Hrvoje Benko and Dr. Eric Whitmire. He has received numerous awards, including ACM CHI Best Paper Award, ACM CHI Honorable Mention Award, and ACM Ubicomp Outstanding Student Award."

