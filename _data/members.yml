  bio: "2006年 芝浦工業大学工学部電子工学科卒。2008年 東京大学大学院新領域創成科学研究科基盤情報学専攻 修士課程修了。2012年 東京大学大学院工学系研究科融合情報学専攻 博士課程修了（工学博士）。2008年4月〜2009年9月 株式会社アクティスにて携帯電話網ノード・トランスポートスイッチの開発などに従事。2012年4月〜2013年9月 学振特別研究員。2013年5〜9月 米ミネソタ大客員研究員。2013年10月〜2021年3月 九州大学大学院システム情報科学研究院 助教。2021年4月より公立はこだて未来大学システム情報科学部 准教授（現職）。<br><br>省電力無線通信、センサネットワーク、無線・音響センシングに関する研究に従事。<br><br>2016年度 山下記念研究賞、2023年 IPSJ/IEEE Computer Society Young Computer Researcher Award。電子情報通信学会・情報処理学会・IEEE・ACM 各会員。"
