<!-- ナビ等のページ内リンク: スクロールするが URL に #... を残さない -->
<script>
(function () {
  function headerOffset() {
    var m = document.querySelector('.masthead');
    if (!m) return 0;
    var pos = getComputedStyle(m).position;
    return (pos === 'fixed' || pos === 'sticky') ? m.offsetHeight + 8 : 0;
  }
  function scrollToId(id) {
    var el = document.getElementById(id);
    if (!el) return false;
    var top = el.getBoundingClientRect().top + window.pageYOffset - headerOffset();
    window.scrollTo({ top: top, behavior: 'smooth' });
    return true;
  }
  function stripHash() {
    if (location.hash) history.replaceState(null, '', location.pathname + location.search);
  }
  /* キャプチャ段階で先に処理し、テーマの smooth-scroll が # を付け直すのを防ぐ */
  document.addEventListener('click', function (e) {
    var a = e.target.closest && e.target.closest('a[href*="#"]');
    if (!a) return;
    var href = a.getAttribute('href') || '';
    var i = href.indexOf('#');
    if (i < 0) return;
    var id = href.slice(i + 1);
    if (!id || !document.getElementById(id)) return; /* 別ページのアンカー等はそのまま */
    e.preventDefault();
    e.stopImmediatePropagation();
    scrollToId(id);
    stripHash();
  }, true);
  /* 左上のブランド名（JST CRONOS）: ホームならリロードせずトップへスムーズスクロール。
     リンク文字だけでなく親 li（余白部分）のクリックも拾う。 */
  document.addEventListener('click', function (e) {
    var item = e.target.closest && e.target.closest('.masthead__menu-item--lg');
    if (!item) return;
    var onHome = location.pathname === '/' || location.pathname === '/index.html';
    if (!onHome) return; /* 別ページからはそのままトップページへ遷移 */
    e.preventDefault();
    e.stopImmediatePropagation();
    var supportsSmooth = 'scrollBehavior' in document.documentElement.style;
    if (supportsSmooth) {
      window.scrollTo({ top: 0, left: 0, behavior: 'smooth' });
    } else {
      /* スムーズスクロール非対応ブラウザは確実に最上部へジャンプ */
      window.scrollTo(0, 0);
      if (document.documentElement) document.documentElement.scrollTop = 0;
      if (document.body) document.body.scrollTop = 0;
    }
    stripHash();
  }, true);
  /* メンバーの ⓘ クリックで経歴(bio)の表示/非表示を切り替え。外側クリックで閉じる。 */
  document.addEventListener('click', function (e) {
    var hint = e.target.closest && e.target.closest('.bio-hint');
    if (hint) {
      var card = hint.closest('.member-card');
      if (card) {
        var isOpen = card.classList.contains('bio-open');
        var opened = document.querySelectorAll('.member-card.bio-open');
        for (var i = 0; i < opened.length; i++) opened[i].classList.remove('bio-open');
        if (!isOpen) card.classList.add('bio-open');
        e.stopPropagation();
      }
      return;
    }
    /* bio 以外をクリックしたら開いている経歴を閉じる */
    if (!(e.target.closest && e.target.closest('.member-bio'))) {
      var open = document.querySelectorAll('.member-card.bio-open');
      for (var j = 0; j < open.length; j++) open[j].classList.remove('bio-open');
    }
  });
  /* 何かが # を付けても即座に消す（保険） */
  window.addEventListener('hashchange', stripHash);
  window.addEventListener('load', function () {
    if (location.hash && location.hash.length > 1) {
      scrollToId(location.hash.slice(1));
      stripHash();
    }
  });
  /* トップのスライドショー: 画像を交互にクロスフェード */
  document.addEventListener('DOMContentLoaded', function () {
    var slides = document.querySelectorAll('.hero-slide');
    if (slides.length < 2) return;
    var i = 0;
    setInterval(function () {
      slides[i].classList.remove('is-active');
      i = (i + 1) % slides.length;
      slides[i].classList.add('is-active');
    }, 5000);
  });

  /* トップ画像をコンテナのグリッドオフセットに関わらず画面いっぱい（左右余白ゼロ）に。
     .page が Susy グリッドで中央寄せでないため、実測して margin で補正する。 */
  function fitHero() {
    var h = document.querySelector('.hero-slideshow');
    if (!h) return;
    h.style.width = '100vw';
    h.style.marginLeft = '0';
    h.style.marginRight = '0';
    var left = h.getBoundingClientRect().left;
    h.style.marginLeft = (-left) + 'px';
  }
  window.addEventListener('load', fitHero);
  window.addEventListener('resize', fitHero);
  document.addEventListener('DOMContentLoaded', fitHero);
})();
</script>
