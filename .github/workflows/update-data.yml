# Publications / Awards をスプレッドシート(CSV公開URL)から取得し、1日1回 _data/ に反映する。
# 反映後の push が Pages デプロイ(jekyll-gh-pages.yml)をトリガーします。
#
# 事前準備:
#   1) Google スプレッドシートを「ファイル > 共有 > ウェブに公開」で各シートを CSV 公開する
#      （または gviz の CSV エクスポートURLを使う）。
#   2) リポジトリの Settings > Secrets and variables > Actions > Variables に以下を登録:
#        PUBLICATIONS_CSV_URL = 業績シートのCSV公開URL
#        AWARDS_CSV_URL       = 受賞シートのCSV公開URL
#      ヘッダー行は以下の列名にしてください:
#        publications: year,authors,title,publisher,pdf,doi,youtube,code,arxiv,press,media
#        awards:       year,authors,title,url （recipient,organization 列も後方互換で利用可）
#      ※ ヘッダーの前後空白や CR は取り込み時に自動で除去します。
#      ※ AWARDS_CSV_URL 未設定時は既定で当リポジトリ指定のスプレッドシート「Award」シートを使用。
#   3) （任意）論文タイトルのネイティブ斜体/太字をそのまま反映したい場合:
#        - Google Cloud で API キーを作成し「Google Sheets API」を有効化
#        - Settings > Secrets and variables > Actions > Secrets に
#            GOOGLE_SHEETS_API_KEY = 作成したAPIキー
#          を登録（シートは「リンクを知る全員が閲覧可」にしておく）
#        - 必要なら Variables に PUBLICATIONS_SHEET_ID / PUBLICATIONS_SHEET_NAME も登録
#          （未設定時は既定のスプレッドシートID・シート名「Publication」を使用）
#        ※ CSV はセル内の部分的な書式を保持しないため、Sheets API 経由で
#          textFormatRuns を取得して <i>/<b> に変換します（キー未設定なら何もしません）。
#
#      publications の各列（リンク列は空欄ならそのリンクは非表示）:
#        publisher  会議/論文誌名（斜体で表示。旧 venue 列も後方互換）
#        pdf        論文PDF。paper/ のファイル名、または http から始まるフルURL → "PDF" リンク（旧 paper 列も可）
#        doi        DOI/出版社ページURL → "DOI" リンク（旧 url 列も後方互換）
#        youtube    動画URL → "YouTube" リンク（旧 video 列も可）
#        code       コードURL → "Code" リンク
#        arxiv      arXiv URL → "arXiv" リンク
#        press      プレスリリースURL → "Press" リンク
#        media      メディア記事URL → "Media" リンク

name: Update data from spreadsheet

on:
  schedule:
    - cron: "0 21 * * *"   # 毎日 06:00 JST (21:00 UTC)
  workflow_dispatch:        # 手動実行も可能

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download CSVs from spreadsheet
        env:
          PUBLICATIONS_CSV_URL: ${{ vars.PUBLICATIONS_CSV_URL }}
          # 未設定なら下記スプレッドシートの「Award」シートを使う
          AWARDS_CSV_URL: ${{ vars.AWARDS_CSV_URL || 'https://docs.google.com/spreadsheets/d/1bHJfQ9qKrqRu0MSns7lOH6VJq6RyZdECyhNP_HsG1Pc/gviz/tq?tqx=out:csv&sheet=Award' }}
        run: |
          set -e
          # ダウンロードした CSV を正規化: CR 除去 + ヘッダー行の余分な空白を除去
          clean() {
            sed -i 's/\r$//' "$1"
            sed -i '1{s/[[:space:]]*"[[:space:]]*/"/g; s/[[:space:]]*,[[:space:]]*/,/g; s/^[[:space:]]*//; s/[[:space:]]*$//}' "$1"
          }
          if [ -n "$PUBLICATIONS_CSV_URL" ]; then
            echo "Fetching publications..."
            curl -sSL "$PUBLICATIONS_CSV_URL" -o _data/publications.csv
            clean _data/publications.csv
          else
            echo "PUBLICATIONS_CSV_URL not set; skipping."
          fi
          if [ -n "$AWARDS_CSV_URL" ]; then
            echo "Fetching awards..."
            curl -sSL "$AWARDS_CSV_URL" -o _data/awards.csv
            clean _data/awards.csv
          else
            echo "AWARDS_CSV_URL not set; skipping."
          fi

      - name: Enrich publications from DOI (fill empty fields via Crossref)
        run: |
          if [ -f _data/publications.csv ]; then
            python3 scripts/enrich_publications.py _data/publications.csv || echo "enrichment skipped"
          fi

      - name: Apply native italic/bold titles from the sheet (Sheets API)
        env:
          GOOGLE_SHEETS_API_KEY: ${{ secrets.GOOGLE_SHEETS_API_KEY }}
          PUBLICATIONS_SHEET_ID: ${{ vars.PUBLICATIONS_SHEET_ID || '1bHJfQ9qKrqRu0MSns7lOH6VJq6RyZdECyhNP_HsG1Pc' }}
          PUBLICATIONS_SHEET_NAME: ${{ vars.PUBLICATIONS_SHEET_NAME || 'Publication' }}
        run: |
          if [ -n "$GOOGLE_SHEETS_API_KEY" ] && [ -f _data/publications.csv ]; then
            python3 scripts/enrich_titles_richtext.py _data/publications.csv "$PUBLICATIONS_SHEET_ID" "$PUBLICATIONS_SHEET_NAME" || echo "rich-text titles skipped"
          else
            echo "GOOGLE_SHEETS_API_KEY not set; skipping rich-text titles."
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- _data/publications.csv _data/awards.csv; then
            git add _data/publications.csv _data/awards.csv
            git commit -m "chore: update publications/awards from spreadsheet"
            git push
          else
            echo "No changes."
          fi
